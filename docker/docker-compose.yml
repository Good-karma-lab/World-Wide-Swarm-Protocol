version: '3.8'

# 20-node WWS network for E2E testing
# All nodes on same Docker bridge network

networks:
  wws-net:
    driver: bridge

x-node-base: &node-base
  image: wws-connector:local
  build:
    context: ..
    dockerfile: docker/Dockerfile
  networks:
    - wws-net
  restart: "no"

services:
  wws-node-1:
    <<: *node-base
    ports: ["9370:9370", "9371:9371"]
    command: ["--agent-name", "turing", "--rpc", "0.0.0.0:9370", "--files-addr", "0.0.0.0:9371"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9371/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  wws-node-2:
    <<: *node-base
    ports: ["9372:9370", "9373:9371"]
    command: ["--agent-name", "lovelace", "--rpc", "0.0.0.0:9370", "--files-addr", "0.0.0.0:9371"]
    depends_on: [wws-node-1]

  wws-node-3:
