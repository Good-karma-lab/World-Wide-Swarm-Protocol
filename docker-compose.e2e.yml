      --files-addr 0.0.0.0:9371
      --agent-name wws-node-4
    networks:
      net-alpha:
        ipv4_address: 172.28.0.5
    ports: ["9376:9370", "9377:9371"]
    depends_on: [wws-node-1]

  # ── net-beta (node 5 bridges alpha↔beta) ─────────────────────────────────
  wws-node-5:
