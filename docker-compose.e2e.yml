# WWS E2E Multi-Network Docker Test
# 20 nodes across 5 isolated Docker bridge networks.
#
# Network topology:
#   net-alpha  (172.28.0.0/24): nodes 1-4
#   net-beta   (172.28.1.0/24): nodes 5-8   (node 5 bridges alpha↔beta)
#   net-gamma  (172.28.2.0/24): nodes 9-12  (node 9 bridges beta↔gamma)
#   net-delta  (172.28.3.0/24): nodes 13-16 (node13 bridges gamma↔delta)
#   net-epsilon(172.28.4.0/24): nodes 17-20 (node17 bridges delta↔epsilon)
#
# Bootstrap: node 1 (172.28.0.2). The entrypoint.sh resolves its peer ID
# dynamically via /api/identity so no peer IDs are hardcoded here.
#
# Usage:
#   docker build -t wws-connector:latest .
#   docker compose -f docker-compose.e2e.yml up -d
#   python3 tests/e2e/e2e_20_agents.py   # agents connect to host ports 9370-9409
#   docker compose -f docker-compose.e2e.yml down

networks:
  net-alpha:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  net-beta:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  net-gamma:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24
  net-delta:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.3.0/24
  net-epsilon:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.4.0/24

x-base: &base
  image: wws-connector:latest
  restart: unless-stopped
  stop_grace_period: 5s

# entrypoint.sh interprets RESOLVE:<http-host>:<http-port>:<p2p-port> as:
#   "wait for that host, query its /api/identity, build --bootstrap multiaddr"

services:
  # ── net-alpha ────────────────────────────────────────────────────────────
  wws-node-1:
    <<: *base
    command: >
      --listen /ip4/0.0.0.0/tcp/9000
      --rpc 0.0.0.0:9370
      --files-addr 0.0.0.0:9371
      --agent-name wws-node-1
    networks:
      net-alpha:
        ipv4_address: 172.28.0.2
    ports: ["9370:9370", "9371:9371"]

  wws-node-2:
    <<: *base
    command: >
      RESOLVE:172.28.0.2:9371:9000
      --listen /ip4/0.0.0.0/tcp/9000
      --rpc 0.0.0.0:9370
      --files-addr 0.0.0.0:9371
      --agent-name wws-node-2
    networks:
      net-alpha:
        ipv4_address: 172.28.0.3
    ports: ["9372:9370", "9373:9371"]
    depends_on: [wws-node-1]

  wws-node-3:
    <<: *base
    command: >
      RESOLVE:172.28.0.2:9371:9000
      --listen /ip4/0.0.0.0/tcp/9000
      --rpc 0.0.0.0:9370
      --files-addr 0.0.0.0:9371
      --agent-name wws-node-3
    networks:
      net-alpha:
        ipv4_address: 172.28.0.4
    ports: ["9374:9370", "9375:9371"]
    depends_on: [wws-node-1]

  wws-node-4:
